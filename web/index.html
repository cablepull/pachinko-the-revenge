<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Pachinko: The Revenge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #06040c;
            color: #ddc;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            overflow: hidden;
            height: 100%;
            width: 100%;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 {
            font-size: 18px;
            margin: 12px 0 4px;
            color: #f3b54a;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .sub {
            font-size: 12px;
            color: #998877;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }
        #glcanvas {
            display: block;
            margin: 0 auto;
            border: 2px solid #5a3a18;
            box-shadow: 0 0 36px rgba(220, 160, 50, 0.25);
            background: #06040c;
            outline: none;
        }
        .controls {
            margin-top: 10px;
            font-size: 12px;
            color: #aa9;
            letter-spacing: 1px;
        }
        kbd {
            background: #2a1f1a;
            border: 1px solid #5a3a18;
            border-radius: 3px;
            padding: 1px 6px;
            color: #f3b54a;
            font-family: monospace;
        }
        #click-to-start {
            position: fixed;
            inset: 0;
            background: rgba(6, 4, 12, 0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99;
            cursor: pointer;
        }
        #click-to-start .big {
            font-size: 36px;
            color: #f3b54a;
            letter-spacing: 8px;
            margin-bottom: 14px;
        }
        #click-to-start .small {
            font-size: 14px;
            color: #aa9;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <h1>Pachinko: The Revenge</h1>
    <div class="sub">MVP build · pachinko-core + macroquad · WASM</div>
    <canvas id="glcanvas" tabindex='1' width="1100" height="800"></canvas>
    <div class="controls">
        <kbd>SPACE</kbd> or <kbd>CLICK</kbd> — pull chucker (hold for auto-fire) &nbsp;&nbsp;
        <kbd>R</kbd> — reset session
    </div>

    <div id="click-to-start">
        <div class="big">CLICK  TO  START</div>
        <div class="small">browser audio policy requires a click before sound plays</div>
    </div>

    <script src="mq_js_bundle.js"></script>
    <script>
        // Macroquad's WASM glue: load + run.
        load("pachinko-game.wasm");

        // Dismiss "click to start" overlay on first interaction.
        const overlay = document.getElementById("click-to-start");
        const dismiss = () => {
            overlay.style.display = "none";
            // Resume audio context if suspended (browsers gate audio behind user gesture)
            if (typeof audio !== "undefined" && audio.context && audio.context.state === "suspended") {
                audio.context.resume();
            }
            document.removeEventListener("click", dismiss);
            document.removeEventListener("keydown", dismiss);
            // Focus the canvas so keyboard events route to it
            document.getElementById("glcanvas").focus();
        };
        document.addEventListener("click", dismiss);
        document.addEventListener("keydown", dismiss);
    </script>
</body>
</html>
